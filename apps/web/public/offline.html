<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline · SpeedyVan</title>
    <meta name="theme-color" content="#FACC15" />
    <link rel="icon" href="/logo.png" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(180deg, #0F172A 0%, #1E293B 100%);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 420px;
        text-align: center;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 32px 24px;
      }
      img { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; }
      h1 { margin: 16px 0 8px; font-size: 22px; font-weight: 800; }
      p { margin: 0 0 20px; color: #cbd5e1; font-size: 14px; line-height: 1.5; }
      a {
        display: inline-flex; align-items: center; justify-content: center;
        background: #FACC15; color: #0F172A; font-weight: 800;
        padding: 12px 20px; border-radius: 10px;
        text-decoration: none; font-size: 14px;
      }
      .tel { margin-top: 12px; display: block; color: #FACC15; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo.png" alt="SpeedyVan" />
      <h1>You're offline</h1>
      <p>We can't reach the internet right now. Your last quote and saved bookings still work — once you're back online, we'll sync.</p>
      <a href="/" onclick="location.reload();return false">Try again</a>
      <a class="tel" href="tel:01202129746">📞 Call 01202 129746</a>
    </div>
  </body>
</html>
